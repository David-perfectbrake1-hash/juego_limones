<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caza Limones - Expedición Amazónica</title>
  <!-- Vinculación a la hoja de estilos -->
  <link rel="stylesheet" href="limones.css">
  <!-- Fuente Inter para tipografía limpia y moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego()">
  <!-- Contenedor principal con efecto glassmorphism -->
  <div class="contenedor">
    
    <!-- Encabezado del juego -->
    <header class="game-header">
      <div class="logo-container">
        <!-- Placeholder visual para logo de expedición/selva -->
        <span style="font-size: 4rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));">🌿</span>
      </div>
      <h1>ATRAPA  LIMONES</h1>
      <p class="subtitle">La selva te pone a prueba...</p>
      <p class="tagline">¿Lograrás cosecharlos todos?</p>
    </header>

    <!-- Panel de estadísticas (IDs conservados estrictamente) -->
    <div class="panel">
      <div class="stat-item">
        <span class="stat-label">Puntaje</span>
        <span class="stat-value" id="txtPuntaje">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Vidas</span>
        <span class="stat-value" id="txtVidas">3</span>
      </div>
    </div>

    <!-- Área de juego (Canvas) -->
    <canvas id="areaJuego" width="600" height="400"></canvas>

    <p class="instrucciones-teclado">Usa las flechas del teclado ◀ ▶ para cosechar los limones</p>

    <!-- Botones de control -->
    <div class="botones">
      <button onclick="moverIzquierda()">⬅ Izquierda</button>
      <button onclick="moverDerecha()">Derecha ➡</button>
      <button id="reiniciar" onclick="reiniciarJuego()">🔄 REINICIAR</button>
    </div>

    <p class="author">Autor: David_RS</p>
  </div>

  <!-- Scripts en orden de dependencia -->
  <script src="utils.js"></script>
  <script src="limones.js"></script>
</body>
</html>
